<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team. Ohana — Tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    padding: 40px 20px;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    top: 8%;
    left: -3%;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: rgba(255, 153, 51, 0.12);
    filter: blur(50px);
    z-index: 0;
  }
  body::after {
    content: "";
    position: fixed;
    bottom: 8%;
    right: -3%;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: rgba(255, 102, 0, 0.08);
    filter: blur(60px);
    z-index: 0;
  }
  .container {
    max-width: 580px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .icon-large {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 0 auto 20px;
    box-shadow: 0 12px 32px rgba(255, 102, 0, 0.18);
    display: block;
    background: white;
  }
  h1 {
    color: #ff6600;
    font-size: 42px;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    text-shadow: 3px 3px 0 #ffd9b8;
  }
  h1 .dot { color: #ff9933; }
  .tagline {
    display: inline-block;
    background: white;
    color: #ff6600;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 3px;
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 12px;
    box-shadow: 0 3px 12px rgba(255, 102, 0, 0.15);
  }
  .subtitle {
    color: #cc5500;
    font-size: 14px;
    margin-bottom: 36px;
    font-weight: 700;
  }
  .tool-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .tool-card {
    background: white;
    padding: 22px 26px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 18px;
    text-align: left;
    border: 3px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .tool-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 200, 100, 0.18), transparent);
    transition: left 0.6s;
  }
  .tool-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 28px rgba(255, 102, 0, 0.2);
    border-color: #ffaa66;
  }
  .tool-card:hover::before { left: 100%; }
  .tool-card .body { flex: 1; }
  .tool-card .name {
    font-weight: 800;
    color: #ff6600;
    font-size: 17px;
    margin-bottom: 5px;
  }
  .tool-card .desc {
    font-size: 13px;
    color: #663300;
    font-weight: 600;
    line-height: 1.5;
  }
  .tool-card .arrow {
    color: #ff9933;
    font-size: 24px;
    flex-shrink: 0;
    font-weight: 900;
    transition: transform 0.2s;
  }
  .tool-card:hover .arrow { transform: translateX(4px); }
  footer {
    margin-top: 36px;
    color: #cc5500;
    font-size: 12px;
    letter-spacing: 2px;
    font-weight: 700;
  }
  footer .heart { color: #ff6600; }
</style>
</head>
